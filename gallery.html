<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#06040f">
  <title>Gallery — Gallery Codex</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-hero{padding:28px 0 20px;text-align:center}
    .gallery-hero h1{
      font-family:var(--font-disp);font-size:clamp(1.6rem,6vw,3rem);
      background:linear-gradient(135deg,var(--accent2),var(--primary2),var(--accent1));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      margin-bottom:8px;animation:fadeUp .5s var(--ease-s) both;
    }
    .gallery-hero p{color:var(--text2);font-size:.88rem;max-width:340px;margin:0 auto;animation:fadeUp .5s var(--ease-s) .1s both}
    .result-info{color:var(--text3);font-size:.78rem;margin-bottom:10px}
  </style>
</head>
<body>
<div id="loadingScreen">
  <div class="loader-outer">
    <div class="loader-ring lr1"></div><div class="loader-ring lr2"></div>
    <div class="loader-logo">✦</div>
  </div>
  <div class="loader-text">Gallery Codex</div>
  <div class="loader-bar-wrap"><div class="loader-bar"></div></div>
</div>

<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div class="stars"></div>

<nav class="nav">
  <a class="nav-logo" href="index.html">✦ Codex</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="category.html">Categories</a>
    <a class="nav-link active" href="gallery.html">Gallery</a>
  </div>
  <div class="nav-actions">
    <button class="icon-btn refresh-btn" onclick="refreshPage()" title="Refresh">↻</button>
    <button class="icon-btn theme-btn" onclick="toggleTheme()">☀️</button>
    <a class="nav-submit" href="#" id="submitBtn">+ Submit</a>
  </div>
</nav>

<div class="page-wrap">
  <div class="container">

    <div class="gallery-hero">
      <h1>Full Gallery</h1>
      <p>Every artwork, all in one place.</p>
    </div>

    <!-- Category pills -->
    <div class="cat-pills reveal" id="catPills" style="margin-bottom:12px"></div>

    <!-- Filter chips -->
    <div class="filter-banner reveal">
      <span>Filter:</span>
      <button class="toggle-chip" id="featuredChip">⭐ Featured</button>
      <button class="toggle-chip" id="likedChip">♥ Liked</button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar reveal">
      <div class="search-wrap">
        <input class="search-input" id="gallerySearch" type="text" placeholder="Search anything…" autocomplete="off">
        <span class="search-icon">🔍</span>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="default">Sort: Default</option>
        <option value="az">A → Z</option>
        <option value="za">Z → A</option>
        <option value="cat">By Category</option>
        <option value="featured">Featured First</option>
      </select>
      <div class="view-toggle">
        <button class="view-btn active" id="gridView">⊞</button>
        <button class="view-btn" id="listView">☰</button>
      </div>
    </div>

    <div class="result-info" id="resultCount"></div>

    <!-- Views -->
    <div class="card-grid" id="mainGrid"></div>
    <div class="card-list hidden" id="mainList"></div>

    <div class="empty-state hidden" id="emptyState"><div class="icon">🌙</div><div>No artworks match your filters.</div></div>
    <button class="load-more hidden" id="loadMore">Load More ↓</button>
    <div class="spacer"></div>
  </div>

  <footer>
    <div class="logo">✦ Gallery Codex</div>
    <p>All art belongs to their respective artists.</p>
    <p style="margin-top:6px"><a href="#" id="footerForm" style="color:var(--primary2)">Submit your artwork →</a></p>
  </footer>
</div>

<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <a class="bnav-item" href="index.html"><span class="bnav-icon">🏠</span>Home</a>
    <a class="bnav-item" href="category.html"><span class="bnav-icon">🗂️</span>Categories</a>
    <a class="bnav-item active" href="gallery.html"><span class="bnav-icon">🖼️</span>Gallery</a>
    <button class="bnav-item" onclick="toggleTheme()"><span class="bnav-icon">☀️</span>Theme</button>
  </div>
</nav>

<script src="config.js"></script>
<script src="script.js"></script>
<script>
  let ALL_DATA = [];
  let filtered = [];
  let currentCat = "all";
  let currentSort = "default";
  let showFeatured = false;
  let showLiked = false;
  let isGrid = true;
  let page = 0;
  const PER = CONFIG.itemsPerPage;

  async function init() {
    ALL_DATA = await loadGalleryData();
    document.getElementById("submitBtn").href = CONFIG.FORM_URL;
    document.getElementById("footerForm").href = CONFIG.FORM_URL;
    buildPills();
    applyAll();
    checkUrlId(ALL_DATA);
  }

  document.addEventListener("DOMContentLoaded", () => {
    init();

    document.getElementById("gallerySearch").addEventListener("input", () => { page=0; applyAll(); });
    document.getElementById("sortSelect").addEventListener("change", e => { currentSort=e.target.value; page=0; applyAll(); });

    // View toggle
    document.getElementById("gridView").addEventListener("click", () => {
      isGrid=true;
      document.getElementById("gridView").classList.add("active");
      document.getElementById("listView").classList.remove("active");
      document.getElementById("mainGrid").classList.remove("hidden");
      document.getElementById("mainList").classList.add("hidden");
    });
    document.getElementById("listView").addEventListener("click", () => {
      isGrid=false;
      document.getElementById("listView").classList.add("active");
      document.getElementById("gridView").classList.remove("active");
      document.getElementById("mainList").classList.remove("hidden");
      document.getElementById("mainGrid").classList.add("hidden");
    });

    // Filter chips
    document.getElementById("featuredChip").addEventListener("click", e => {
      showFeatured=!showFeatured; e.currentTarget.classList.toggle("on",showFeatured); page=0; applyAll();
    });
    document.getElementById("likedChip").addEventListener("click", e => {
      showLiked=!showLiked; e.currentTarget.classList.toggle("on",showLiked); page=0; applyAll();
    });

    document.getElementById("loadMore").addEventListener("click", () => { page++; showPage(true); });
    window.addEventListener("codex:refresh", () => init());
  });

  function buildPills() {
    const pills = document.getElementById("catPills");
    pills.innerHTML = "";
    const cats = ["all", ...new Set(ALL_DATA.map(d => d.category).filter(Boolean))];
    cats.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-pill" + (cat === currentCat ? " active" : "");
      const meta = CONFIG.categories.find(c => c.id === cat);
      btn.textContent = meta ? `${meta.icon} ${meta.label}` : cat.charAt(0).toUpperCase() + cat.slice(1);
      btn.addEventListener("click", () => {
        document.querySelectorAll(".cat-pill").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        currentCat = cat; page = 0; applyAll();
      });
      pills.appendChild(btn);
    });
  }

  function applyAll() {
    const q = document.getElementById("gallerySearch").value.toLowerCase().trim();
    let data = currentCat === "all" ? [...ALL_DATA] : ALL_DATA.filter(d => d.category === currentCat);
    if (showFeatured) data = data.filter(d => d.featured === "true");
    if (showLiked)    data = data.filter(d => isLiked(d.id));
    if (q) data = data.filter(d =>
      d.title.toLowerCase().includes(q) ||
      (d.artist||"").toLowerCase().includes(q) ||
      (d.tags||"").toLowerCase().includes(q) ||
      (d.category||"").toLowerCase().includes(q)
    );
    if (currentSort === "az")       data.sort((a,b) => a.title.localeCompare(b.title));
    else if (currentSort === "za")  data.sort((a,b) => b.title.localeCompare(a.title));
    else if (currentSort === "cat") data.sort((a,b) => (a.category||"").localeCompare(b.category||""));
    else if (currentSort === "featured") data.sort((a,b) => (b.featured==="true")-(a.featured==="true"));
    filtered = data; page = 0; showPage(false);
  }

  function showPage(append) {
    const grid = document.getElementById("mainGrid");
    const list = document.getElementById("mainList");
    const emptyEl = document.getElementById("emptyState");
    const loadBtn = document.getElementById("loadMore");
    const countEl = document.getElementById("resultCount");

    if (!append) { grid.innerHTML = ""; list.innerHTML = ""; }

    if (filtered.length === 0) {
      emptyEl.classList.remove("hidden"); countEl.textContent = "";
      loadBtn.classList.add("hidden"); return;
    }
    emptyEl.classList.add("hidden");

    const start = page * PER;
    const slice = filtered.slice(start, start + PER);
    const shown = Math.min((page+1)*PER, filtered.length);
    countEl.textContent = `Showing ${shown} of ${filtered.length} artworks`;

    // Grid items
    slice.forEach((item, i) => grid.appendChild(buildCard(item, append ? i : start+i)));

    // List items
    slice.forEach((item, i) => {
      const liked = isLiked(item.id);
      const div = document.createElement("div");
      div.className = "list-card";
      div.style.animationDelay = `${i*0.04}s`;
      div.innerHTML = `
        <img class="list-card-img" src="${item.image}" alt="${item.title}" loading="lazy"
             onerror="this.src='https://picsum.photos/seed/${item.id}x/200/200'">
        <div class="list-card-info">
          <div class="list-card-title">${item.title}</div>
          <div class="list-card-meta">by ${item.artist||"Unknown"}</div>
          <span class="list-card-cat">${item.category||""}</span>
        </div>
        <button class="list-card-like" title="Like" aria-label="Like">${liked?"♥":"♡"}</button>
      `;
      div.querySelector(".list-card-info").addEventListener("click", () => openModal(item));
      div.querySelector(".list-card-img").addEventListener("click", () => openModal(item));
      div.querySelector(".list-card-like").addEventListener("click", e => {
        const nowLiked = toggleLike(item.id);
        e.currentTarget.textContent = nowLiked ? "♥" : "♡";
        e.currentTarget.style.color = nowLiked ? "var(--accent1)" : "";
      });
      list.appendChild(div);
    });

    if (shown < filtered.length) loadBtn.classList.remove("hidden");
    else loadBtn.classList.add("hidden");
  }
</script>
</body>
</html>
